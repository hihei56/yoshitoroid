app = "yoshitoroid"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[deploy]
  strategy = "immediate"

# 👇 メインプロセス定義（重要）
[processes]
  app = "node index.js"

# 👇 HTTPダミー（スリープ防止の核）
[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 80

  [[services.ports]]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  # 👇 ヘルスチェック（安定性UP）
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
