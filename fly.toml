app = "yoshitoroid"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# --- 🚀 多重起動を防ぐための追加設定 ---
[deploy]
  # 「新しいのを立ち上げてから古いのを消す」ではなく
  # 「古いのを消してから新しいのを立ち上げる」設定に変えます
  strategy = "immediate"

# スラッシュコマンド等を使わないなら、以下の [http_service] は消したままでOKです。
# もし残っているなら、全て削除してください。
