app = "yoshitoroid"
primary_region = "nrt"  # 成田（東京近郊）が最速です

[build]
  dockerfile = "Dockerfile"

[vm]
  # CPUは1つのままでOK。増やしてもラグは減りません。
  cpu_kind = "shared"
  cpus = 1
  # メモリ512MB。これが4連投時の「カクつき」を消す決定打です。
  memory_mb = 512

# 重要：[[services]] や [http_service] のブロックはすべて削除してください。
# それらがあると、ボットに関係ないWeb用の待機プログラムが動いてラグの元になります。
