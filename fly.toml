app = "yoshitoroid"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# 🔥 落ちても自動で蘇生する（不死鳥設定）
[restart]
  policy = "always"
  retries = 3

# 🔥 2重起動を絶対に許さない（スケール固定）
[deploy]
  strategy = "immediate"
  max_unavailable = 1

# ※この下には絶対に何も書かない！（スリープの原因になるため）
